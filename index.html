<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💕 Be My Valentine? 💕</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #ffe6f0, #fff0f5, #ffebee);
      color: #c2185b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: auto;           /* Allow scrolling if needed */
      padding: 20px 10px;
    }

    .container {
      max-width: 100%;
      width: 100%;
      z-index: 10;
    }

    /* Question Section */
    #questionSection h1 {
      font-size: 2.8rem;
      line-height: 1.1;
      margin-bottom: 0.4em;
      color: #d81b60;
    }

    #questionSection h2 {
      font-size: 1.65rem;
      margin: 1em 0 2.5em;
      color: #e91e63;
      line-height: 1.3;
    }

    .buttons {
      display: flex;
      gap: 60px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 2em 0;
    }

    button {
      font-size: 1.9rem;
      font-weight: bold;
      padding: 18px 50px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
      min-width: 180px;
    }

    #yesBtn {
      background: #ff4081;
      color: white;
    }

    #yesBtn:hover {
      background: #f50057;
      transform: scale(1.08);
    }

    #noBtn {
      background: #78909c;
      color: white;
    }

    /* Success Section - Centered and Scrollable */
    #success {
      display: none;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      justify-content: center;
      padding: 30px 15px;
    }

    #success h1 {
      font-size: 3.8rem;
      color: #e91e63;
      margin-bottom: 0.3em;
      animation: pulse 1.6s infinite;
    }

    #success p {
      font-size: 1.85rem;
      margin: 1em 0 2em;
      color: #c2185b;
      line-height: 1.4;
    }

    #jpg {
      max-width: 180px;
      width: 100%;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(233, 30, 99, 0.4);
      margin-top: 20px;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    .heart-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .heart {
      position: absolute;
      font-size: 1.8rem;
      animation: floatUp 8s linear infinite;
      opacity: 0.7;
    }

    @keyframes floatUp {
      0% { transform: translateY(110vh) translateX(0); }
      100% { transform: translateY(-30vh) translateX(60vw); }
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(-4deg); }
      50% { transform: rotate(4deg); }
    }

    /* Mobile adjustments */
    @media (max-width: 480px) {
      #questionSection h1 { font-size: 2.4rem; }
      #questionSection h2 { font-size: 1.45rem; }
      button { font-size: 1.7rem; padding: 16px 45px; min-width: 160px; }
      #success h1 { font-size: 3.2rem; }
      #success p { font-size: 1.65rem; }
      #jpg { max-width: 160px; }
    }
  </style>
</head>
<body>

  <div class="heart-bg" id="heartBg"></div>

  <div class="container">
    
    <!-- Question Section -->
    <div id="questionSection">
      <h1>HALLLOOO DARLINGGG ♡</h1>
      <h2>LOVE KITA SO MUCHH.. Love mo ba ako???? 🥰💖</h2>

      <div class="buttons">
        <button id="yesBtn">YES 💘</button>
        <button id="noBtn">No 😢</button>
      </div>
    </div>

    <!-- Success Section -->
    <div id="success">
      <h1>YIPPIEEE!! 🎉💕</h1>
      <p>I love you so so so much!!! 🥹🌸✨</p>
      <img id="jpg" src="jade.JPG" alt="My Girl">
    </div>

  </div>

  <script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const questionSection = document.getElementById('questionSection');
    const success = document.getElementById('success');
    const heartBg = document.getElementById('heartBg');

    let yesScale = 1;

    function spawnHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.textContent = ['💗','💖','❤️','💓','💞'][Math.floor(Math.random()*5)];
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (Math.random() * 5 + 6) + 's';
      heart.style.fontSize = (Math.random() * 1.5 + 1.3) + 'rem';
      heartBg.appendChild(heart);
      setTimeout(() => heart.remove(), 11000);
    }

    setInterval(spawnHeart, 600);

    // YES - Hide question, show success properly centered
    yesBtn.addEventListener('click', () => {
      questionSection.style.display = 'none';
      success.style.display = 'flex';        // Changed to flex for better centering

      // Heart burst
      for (let i = 0; i < 40; i++) {
        setTimeout(spawnHeart, i * 60);
      }
    });

    // NO button - runs away
    noBtn.addEventListener('click', () => {
      yesScale += 0.5;
      yesBtn.style.transform = `scale(${yesScale})`;
      yesBtn.style.padding = `${18 + yesScale * 12}px ${50 + yesScale * 25}px`;

      const maxX = window.innerWidth - noBtn.offsetWidth - 80;
      const maxY = window.innerHeight - noBtn.offsetHeight - 100;

      noBtn.style.position = 'fixed';
      noBtn.style.left = `${Math.random() * maxX}px`;
      noBtn.style.top = `${Math.random() * maxY}px`;
      noBtn.style.animation = 'wiggle 0.4s';
    });

    noBtn.addEventListener('mouseenter', () => {
      const maxX = window.innerWidth - noBtn.offsetWidth - 80;
      const maxY = window.innerHeight - noBtn.offsetHeight - 100;
      noBtn.style.position = 'fixed';
      noBtn.style.left = `${Math.random() * maxX}px`;
      noBtn.style.top = `${Math.random() * maxY}px`;
    });
  </script>
</body>
</html>
