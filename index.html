<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💕 My darling? 💕</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #ffe6f0, #fff0f5, #ffebee);
      color: #c2185b;
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: auto;
      padding: 15px;
    }

    .container {
      max-width: 100%;
      width: 100%;
      z-index: 10;
    }

    /* Question Section */
    #questionSection h1 {
      font-size: 3.2rem;
      margin-bottom: 0.4em;
      color: #d81b60;
      text-shadow: 2px 2px #fff, 4px 4px #ffccdd;
    }

    #questionSection h2 {
      font-size: 1.85rem;
      margin: 1em 0 2.5em;
      color: #e91e63;
      line-height: 1.3;
    }

    .buttons {
      display: flex;
      gap: 80px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 2em 0;
    }

    button {
      font-size: 2rem;
      font-weight: bold;
      padding: 20px 55px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 18px rgba(0,0,0,0.18);
      min-width: 200px;
    }

    #yesBtn {
      background: #ff4081;
      color: white;
    }

    #yesBtn:hover {
      background: #f50057;
      transform: scale(1.08);
    }

    #noBtn {
      background: #78909c;
      color: white;
    }

    /* Success Section */
    #success {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 20px 10px;
    }

    #success h1 {
      font-size: 4rem;
      color: #e91e63;
      margin-bottom: 0.3em;
      animation: pulse 1.5s infinite;
    }

    #success p {
      font-size: 2rem;
      margin: 1em 0 1.8em;
      color: #c2185b;
    }

    #jpg {
      max-width: 220px;
      width: 100%;
      border-radius: 20px;
      box-shadow: 0 12px 32px rgba(233,30,99,0.35);
      margin-top: 1em;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.07); }
    }

    .heart-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .heart {
      position: absolute;
      font-size: 1.9rem;
      animation: floatUp 7s linear infinite;
      opacity: 0.65;
    }

    @keyframes floatUp {
      0% { transform: translateY(110vh) translateX(0); }
      100% { transform: translateY(-30vh) translateX(50vw); }
    }
  </style>
</head>
<body>

  <div class="heart-bg" id="heartBg"></div>

  <div class="container">
    
    <!-- Question Section -->
    <div id="questionSection">
      <h1>HALLO DARLING ♡</h1>
      <h2>LOVE KITA SO MUCH love mo ako? 🥰💖</h2>

      <div class="buttons" id="buttonsDiv">
        <button id="yesBtn">YES 💘</button>
        <button id="noBtn">No 😢</button>
      </div>
    </div>

    <!-- Success Section -->
    <div id="success">
      <h1>YIPPIEEE!! 🎉💕</h1>
      <p>I love kita so much!! 🥹🌸✨</p>
      <img id="jpg" src="jade.JPG" alt="My Girl">
    </div>

  </div>

  <script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const questionSection = document.getElementById('questionSection');
    const success = document.getElementById('success');
    const heartBg = document.getElementById('heartBg');

    let yesScale = 1;

    function spawnHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.textContent = ['💗','💖','❤️','💓','💞'][Math.floor(Math.random()*5)];
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (Math.random() * 5 + 6) + 's';
      heart.style.fontSize = (Math.random() * 1.6 + 1.3) + 'rem';
      heartBg.appendChild(heart);
      setTimeout(() => heart.remove(), 9000);
    }

    setInterval(spawnHeart, 650);

    // YES clicked
    yesBtn.addEventListener('click', () => {
      questionSection.style.display = 'none';   // Hide everything including title
      success.style.display = 'flex';

      for (let i = 0; i < 30; i++) {
        setTimeout(spawnHeart, i * 80);
      }
    });

    // NO button runs away
    noBtn.addEventListener('click', () => {
      yesScale += 0.5;
      yesBtn.style.transform = `scale(${yesScale})`;
      yesBtn.style.padding = `${20 + yesScale*15}px ${60 + yesScale*30}px`;

      const maxX = window.innerWidth - noBtn.offsetWidth - 80;
      const maxY = window.innerHeight - noBtn.offsetHeight - 100;

      noBtn.style.position = 'fixed';
      noBtn.style.left = `${Math.random() * maxX}px`;
      noBtn.style.top = `${Math.random() * maxY}px`;
    });

    noBtn.addEventListener('mouseenter', () => {
      const maxX = window.innerWidth - noBtn.offsetWidth - 80;
      const maxY = window.innerHeight - noBtn.offsetHeight - 100;
      noBtn.style.position = 'fixed';
      noBtn.style.left = `${Math.random() * maxX}px`;
      noBtn.style.top = `${Math.random() * maxY}px`;
    });
  </script>
</body>
</html>
